name: "AI Agents"
version: "0.5.10"
slug: agent
description: >-
  Ultra-lightweight personal AI agents with multi-channel support (Telegram,
  Discord, Slack). Powered by github.com/HKUDS/nanobot. Supports OpenAI,
  Anthropic, DeepSeek, Ollama, and any OpenAI-compatible provider.
  Supports multiple independent agent instances with different models and channels.
url: "https://github.com/marcomow/hass-agents"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
homeassistant_api: true

map:
  - type: data
    read_only: false

panel_icon: mdi:robot
panel_title: AI Agents

options:
  timezone: "UTC"
  web_search_provider: "duckduckgo"
  web_search_api_key: ""
  home_assistant:
    enabled: false
    token: ""
  mcp_servers: []
  agents:
    - name: "default"
      provider: "openrouter"
      api_key: ""
      model: "openrouter/auto"
      api_base: ""
      groq_api_key: ""
      system_prompt: ""
      telegram_token: ""
      telegram_allow_from: []
      discord_token: ""
      slack_bot_token: ""
      slack_app_token: ""
      mcp_server_names: ""
      mcp_servers_json: ""

schema:
  timezone: str
  web_search_provider: "str?"
  web_search_api_key: "password?"
  home_assistant:
    enabled: bool
    token: "password?"
  mcp_servers:
    - name: str
      json: str
  agents:
    - name: str
      provider: str
      api_key: "password?"
      model: str
      api_base: "str?"
      groq_api_key: "password?"
      system_prompt: "str?"
      telegram_token: "password?"
      telegram_allow_from:
        - str
      discord_token: "password?"
      slack_bot_token: "password?"
      slack_app_token: "password?"
      mcp_server_names: "str?"
      mcp_servers_json: "str?"

